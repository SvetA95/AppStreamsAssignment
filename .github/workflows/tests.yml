name: Cypress Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: Lint, typecheck, Cypress
    runs-on: ubuntu-latest
    # Timeout for the whole job
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run UI tests (Cypress)
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/**/*.cy.ts
          wait-on: "https://dev.admin.avtoikonom.com"
          wait-on-timeout: 60
          browser: chrome
          record: false
          summary-title: "UI Tests Results"
        env:
          CYPRESS_EMAIL: ${{ secrets.CYPRESS_EMAIL }}
          CYPRESS_PASSWORD: ${{ secrets.CYPRESS_PASSWORD }}
          CYPRESS_API_URL: ${{ secrets.CYPRESS_API_URL }}

      - name: Run API tests (Cypress, no video)
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/api/**/*.cy.ts
          config: video=false
          browser: chrome
          record: false
          install: false
          summary-title: "API Tests Results"
        env:
          CYPRESS_EMAIL: ${{ secrets.CYPRESS_EMAIL }}
          CYPRESS_PASSWORD: ${{ secrets.CYPRESS_PASSWORD }}
          CYPRESS_API_URL: ${{ secrets.CYPRESS_API_URL }}

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 7

      - name: Upload mochawesome report (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-report
          path: cypress/reports
          retention-days: 7

      - name: Upload report for Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: cypress/reports

  deploy-report:
    name: Publish report to GitHub Pages
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Link report in job summary
        run: echo "### [View latest test report](${{ steps.deployment.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"
